server.port: 9000
management.server.port: 9001
management.server.address: 0.0.0.0
#management.endpoints.web.exposure.include=health,info,mappings

# http://localhost:9001/actuator/health
management.endpoint.health.show-details=always

# http://localhost:9001/actuator/info
management.info.env.enabled=true
info.app.name=Sample RESTful Web Service with Spring Boot
info.app.description=Proof of Concept for a RESTful Web Service made with Spring Boot 4 targeting JDK 25

springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/swagger/index.html

# SQLite Database Configuration
# Uses environment variable STORAGE_PATH if set, otherwise defaults to local path
# Dates are stored as Unix timestamps (INTEGER) for robustness - no date format config needed
spring.datasource.url=jdbc:postgresql://localhost:5432/etl

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.schema=etl

hibernate.hbm2ddl.auto=true

spring.jpa.hibernate.ddl-auto=update

//spring.jpa.hibernate.ddl-auto=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.username=etl
spring.datasource.password=etl

executor.thread=2
scheduler.testInterval=5
app.restUrl=https://httpbin.org/json
#security.basic.enabled=false
#management.security.enabled=false
