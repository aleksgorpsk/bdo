<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0" />
    <title>Etl</title>

    <link rel="stylesheet" type="text/css" th:href="@{/css/bootstrap.min.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <link rel="stylesheet" th:href="@{/css/all.min.css}"/>
    <script type="text/javascript" th:href="@{/css/jquery.min.js}"></script>
    <script type="text/javascript" th:href="@{/css/bootstrap.min.js}"></script>
</head>

<body>
<div th:replace="~{fragments/step_instance/header :: header}"></div>

<div class="container-fluid" style="max-width: 900px; margin: 0 auto;">
    <h2 class="text-center">Step instances</h2>

    <div th:if="${message != null}" class="alert alert-success alert-dismissible fade show text-center message"
         role="alert">
        [[${message}]]
        <button type="button" class="close btn-sm" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

    <div class="my-3">
        <form th:action="@{/step_instance_browser}" id="searchForm" th:object="${etlInstanceId}">
            <div class="row d-flex">
                <div class="col-md-6 mt-2">
                    <div class="search">
                        <i class="fa fa-search"></i>
                        <input type="hidden" name="etlInstanceId" th:value="${etlInstanceId}">
                        <input id="keyword" type="search" name="keyword" th:value="${keyword}" required class="form-control"
                               placeholder="Enter keyword">
                        <button type="submit" class="btn btn-secondary">Search</button>
                    </div>
                </div>
                <div class="col-md-3 input-group mt-2">
                    <div class="input-group-prepend">
                        <label class="input-group-text" for="pageSize">Items per page:</label>
                    </div>
                    <select form="searchForm" name="size" th:value="${pageSize}" onchange="changePageSize()" class="size-select"
                            id="pageSize">
                        <option th:each="s : ${ {3, 6, 9} }" th:value="${s}" th:text="${s}" th:selected="${s == pageSize}"></option>
                    </select>
                </div>
                <div class="col-md-1 mt-2">
                    <button id="btnClear" class="btn btn-info">Clear</button>
                </div>
            </div>
        </form>
    </div>

    <div th:if="${stepInstanceList.size() > 0}">
        <table class="table table-hover table-responsive-xl">
            <thead class="thead-light">
            <tr>
                <th th:replace="~{fragments/step_instance/sorting :: sorting('stepInstanceList','Id')}"></th>
                <th th:replace="~{fragments/step_instance/sorting :: sorting('name','Name')}"></th>
                <th th:replace="~{fragments/step_instance/sorting :: sorting('start','Start')}"></th>
                <th th:replace="~{fragments/step_instance/sorting :: sorting('stop','Stop')}"></th>
                <th>Active</th>
                <th>Last status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="stepInstance : ${stepInstanceList}">
                <td> [[${stepInstance.stepInstanceId}]] </td>
                <td> [[${stepInstance.name}]] </td>
                <td> <p th:text="${#temporals.format(stepInstance.start, 'dd-MM-yyyy HH:mm')}"> </td>
                <td> <p th:text="${#temporals.format(stepInstance.stop, 'dd-MM-yyyy HH:mm')}">  </td>
                <td>
                    <img th:if="${stepInstance.active == true}"  th:src="@{/images/icons8-check-24.png}" alt="Disable this etl"/>
                    <img th:if="${stepInstance.active == false}"  th:src="@{/images/icons8-indeterminate-checkbox-24.png}" alt="Enable this etl"/>
                </td>
                <td>       [[${stepInstance.status}]]               </td>
            </tr>

            </tbody>
        </table>
    </div>

    <div class="" th:unless="${stepInstanceList.size() > 0}">
        <span>No etls found!</span>
    </div>

    <nav aria-label="Pagination" th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a th:replace="~{fragments/etl_instance/paging :: paging(1, '<<', 'First Page')}"></a>
            </li>
            <li class="page-item font-weight-bold" th:classappend="${currentPage == 1} ? 'disabled'">
                <a th:replace="~{fragments/etl_instance/paging :: paging(${currentPage - 1}, 'Prev', 'Previous Page')}"></a>
            </li>
            <li class="page-item disabled" th:if="${currentPage - 2 > 1}">
                <a class="page-link" href="#">...</a>
            </li>
            <li class="page-item" th:classappend="${page == currentPage} ? 'active'"
                th:each="page : ${#numbers.sequence(currentPage > 2 ? currentPage - 2 : 1, currentPage + 2 < totalPages ? currentPage + 2 : totalPages)}">
                <a th:replace="~{fragments/etl_instance/paging :: paging(${page}, ${page}, 'Page ' + ${page})}"></a>
            </li>
            <li class="page-item disabled" th:if="${currentPage + 2 < totalPages}">
                <a class="page-link" href="#">...</a>
            </li>
            <li class="page-item font-weight-bold" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a th:replace="~{fragments/etl_instance/paging :: paging(${currentPage + 1},'Next', 'Next Page')}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a th:replace="~{fragments/etl_instance/paging :: paging(${totalPages}, '>>', 'Last Page')}"></a>
            </li>
        </ul>
    </nav>
</div>

<div class="modal fade text-center" id="confirmModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Confirmation</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>

            <div class="modal-body">
                <span id="confirmText"></span>
            </div>

            <div class="modal-footer">
                <a type="button" id="yesBtn" class="btn btn-danger">Yes</a>
                <button type="button" class="btn btn-secondary" data-dismiss="modal">No</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/etl_instance/footer :: footer}"></div>

<script type="text/javascript">
    $(document).ready(function () {
      $(".btn-delete").on("click", function (e) {
        e.preventDefault();
        link = $(this);

        etlTitle = link.attr("etlTitle");
        $("#yesBtn").attr("href", link.attr("href"));
        $("#confirmText").html("Do you want to delete the Etl \<strong\>" + etlTitle + "\<\/strong\>?");
        $("#confirmModal").modal();
      });

      $("#btnClear").on("click", function (e) {
        e.preventDefault();
        $("#keyword").text("");
        window.location = "[[@{/etl_instance_browser}]]";
      });
    });

    function changePageSize() {
      $("#searchForm").submit();
    }
</script>
</body>

</html>
