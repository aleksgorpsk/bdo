<form action="#" th:action="@{/etlForm}" th:object="${etl}" method="post">
    <p>Name: <input type="text" th:field="*{name}" /></p>
    <p><input type="submit" value="Submit" /></p>
    <input type="checkbox" name="active" onchange="getActive(this)"
           th:checked="${etl.active}"/>
    <span>Abroad</span>
</form>
