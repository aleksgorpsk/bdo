services:
  # 1. External Metastore Database (Postgres)
  postgres-metastore:
    image: postgres:13
    container_name: postgres-metastore
    restart: always
    volumes:
      - ./postgres-data:/var/lib/postgresql/data # Persist data
    environment:
      POSTGRES_USER: hiveuser
      POSTGRES_PASSWORD: hivepassword
      POSTGRES_DB: metastore_db
    ports:
      - "5432:5432"

  # 2. Standalone Hive Metastore Service
  hive-metastore:
    image: apache/hive:4.2.0 # Use a specific version
    container_name: hive-metastore
    restart: always
    depends_on:
      - postgres-metastore
    command: ["/opt/apache/hive/bin/hive", "--service", "metastore", "-p", "9083"]
    environment:
      # Configure HMS to use the external Postgres DB
      SERVICE_NAME: metastore
      SERVICE_OPTS: "-Dhive.metastore.uris=thrift://hive-metastore:9083"
      # DB Connection properties (add JDBC driver if needed, but often included)
      HIVE_METASTORE_DB_URL: "jdbc:postgresql://postgres-metastore:5432/metastore_db"
      HIVE_METASTORE_DB_USER: "hiveuser"
      HIVE_METASTORE_DB_PASSWORD: "hivepassword"
    ports:
      - "9083:9083" # Thrift port

  # 3. HiveServer2 (Hive Client)
  hiveserver2:
    image: apache/hive:4.2.0
    container_name: hiveserver2
    restart: always
    volumes:
      - ./hive-warehouse:/opt/hive/data/warehouse
      - ./data:/data
    depends_on:
      - hive-metastore
    environment:
      # Point HS2 to the standalone HMS
      SERVICE_NAME: hiveserver2
      SERVICE_OPTS: "-Dhive.metastore.uris=thrift://hive-metastore:9083"
    ports:
      - "10000:10000" # JDBC port
      - "10002:10002" # WebUI port
  spark-master:
    image: apache/spark:4.1.1
    container_name: spark-master
    ports:
      - "8080:8080"   # Spark Master web UI
      - "7077:7077"   # Spark Master port
      - "4040:4040"   # Spark application UI
    environment:
      - SPARK_MODE=master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - spark-data:/opt/spark/work-dir

  spark-worker-1:
    image: apache/spark:4.1.1
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    volumes:
      - spark-data:/opt/spark/work-dir

  spark-worker-2:
    image: apache/spark:4.1.1
    container_name: spark-worker-2
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    volumes:
      - spark-data:/opt/spark/work-dir

  spark-worker-3:
    image: apache/spark:4.1.1
    container_name: spark-worker-3
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    volumes:
      - spark-data:/opt/spark/work-dir

volumes:
  spark-data: